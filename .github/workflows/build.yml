name: Unit Test, Lint and Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "1 1 2 * *"

permissions:
  pull-requests: read # allows SonarCloud to decorate PRs with analysis results

jobs:
  build_and_test:
    name: "Lint Test and Build"
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Run Linter
        run: make lint
      - name: Run Tests
        run: make test-ci
      - name: Build
        run: make build

